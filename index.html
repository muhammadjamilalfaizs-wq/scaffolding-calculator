<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scaffold Engineering Pro | 3D Calculator</title>
 
<!-- CDN Libraries -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
 
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Red+Hat+Display:wght@400;600;700;900&display=swap" rel="stylesheet">
 
<style>
:root {
  --blueprint-dark: #0a1628;
  --blueprint-navy: #152238;
  --blueprint-blue: #1e3a5f;
  --tech-cyan: #00d9ff;
  --tech-orange: #ff6b35;
  --warn-red: #ff4757;
  --grid-line: rgba(0, 217, 255, 0.1);
  --text-primary: #e8f4f8;
  --text-secondary: #94a3b8;
  --text-dim: #64748b;
}
 
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
 
body {
  font-family: 'Red Hat Display', system-ui, sans-serif;
  background: var(--blueprint-dark);
  color: var(--text-primary);
  overflow-x: hidden;
  position: relative;
}
 
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}
 
.app-container {
  position: relative;
  z-index: 1;
}
 
/* Header Styles */
.app-header {
  background: linear-gradient(135deg, var(--blueprint-navy) 0%, var(--blueprint-blue) 100%);
  border-bottom: 2px solid var(--tech-cyan);
  padding: 1.5rem 2rem;
  position: relative;
  overflow: hidden;
}
 
.app-header::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(0, 217, 255, 0.1) 0%, transparent 70%);
  pointer-events: none;
}
 
.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}
 
.app-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.75rem;
  font-weight: 900;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--tech-cyan) 0%, #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-transform: uppercase;
}
 
.app-subtitle {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 0.25rem;
}
 
.status-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--tech-cyan);
}
 
.status-dot {
  width: 8px;
  height: 8px;
  background: var(--tech-cyan);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--tech-cyan);
  animation: pulse 2s ease-in-out infinite;
}
 
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
 
/* Main Layout */
.main-grid {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 1.5rem;
  padding: 1.5rem;
  max-width: 1800px;
  margin: 0 auto;
}
 
/* Card Styles */
.card {
  background: var(--blueprint-navy);
  border: 1px solid rgba(0, 217, 255, 0.2);
  border-radius: 8px;
  padding: 1.5rem;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
}
 
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, var(--tech-cyan) 0%, transparent 100%);
}
 
.card-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.875rem;
  font-weight: 700;
  color: var(--tech-cyan);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
 
.card-title::before {
  content: '▸';
  color: var(--tech-orange);
}
 
/* Input Styles */
.input-group {
  margin-bottom: 1rem;
}
 
.input-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
  display: block;
}
 
.input-field {
  width: 100%;
  background: var(--blueprint-dark);
  border: 1px solid rgba(0, 217, 255, 0.3);
  color: var(--text-primary);
  padding: 0.75rem;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.875rem;
  transition: all 0.2s ease;
}
 
.input-field:focus {
  outline: none;
  border-color: var(--tech-cyan);
  box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
}
 
.input-field.error {
  border-color: var(--warn-red);
  animation: shake 0.3s ease;
}
 
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
 
.input-error {
  font-size: 0.7rem;
  color: var(--warn-red);
  margin-top: 0.25rem;
  font-family: 'JetBrains Mono', monospace;
  display: none;
}
 
.input-error.visible {
  display: block;
  animation: slideDown 0.2s ease;
}
 
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
 
/* Select Dropdown */
.select-field {
  width: 100%;
  background: var(--blueprint-dark);
  border: 1px solid rgba(0, 217, 255, 0.3);
  color: var(--text-primary);
  padding: 0.75rem;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.875rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
 
.select-field:focus {
  outline: none;
  border-color: var(--tech-cyan);
  box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
}
 
/* Checkbox */
.checkbox-group {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem;
  background: var(--blueprint-dark);
  border: 1px solid rgba(0, 217, 255, 0.2);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
}
 
.checkbox-group:hover {
  border-color: var(--tech-cyan);
  background: rgba(0, 217, 255, 0.05);
}
 
.checkbox-input {
  width: 18px;
  height: 18px;
  accent-color: var(--tech-cyan);
  cursor: pointer;
}
 
.checkbox-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
}
 
/* Warning Box */
.warning-box {
  background: rgba(255, 71, 87, 0.1);
  border: 1px solid var(--warn-red);
  border-radius: 4px;
  padding: 1rem;
  margin-top: 1rem;
  display: none;
  animation: slideDown 0.3s ease;
}
 
.warning-box.visible {
  display: block;
}
 
.warning-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--warn-red);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
 
.warning-title::before {
  content: '⚠';
  font-size: 1rem;
}
 
.warning-text {
  font-size: 0.75rem;
  color: var(--text-secondary);
  line-height: 1.5;
}
 
/* Results Display */
.results-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.75rem;
  margin-top: 1rem;
}
 
.result-item {
  background: var(--blueprint-dark);
  border: 1px solid rgba(0, 217, 255, 0.2);
  border-radius: 4px;
  padding: 0.75rem;
  transition: all 0.2s ease;
}
 
.result-item:hover {
  border-color: var(--tech-cyan);
  transform: translateY(-2px);
}
 
.result-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.25rem;
}
 
.result-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--tech-cyan);
}
 
.result-unit {
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-left: 0.25rem;
}
 
/* 3D Viewer */
.viewer-container {
  background: var(--blueprint-dark);
  border: 1px solid rgba(0, 217, 255, 0.2);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  height: 600px;
}
 
.viewer-overlay {
  position: absolute;
  top: 1rem;
  left: 1rem;
  background: rgba(10, 22, 40, 0.9);
  border: 1px solid rgba(0, 217, 255, 0.3);
  border-radius: 4px;
  padding: 0.75rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-secondary);
  z-index: 10;
  backdrop-filter: blur(8px);
}
 
.viewer-overlay-item {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.25rem;
}
 
.viewer-overlay-label {
  color: var(--text-dim);
}
 
.viewer-overlay-value {
  color: var(--tech-cyan);
  font-weight: 700;
}
 
.viewer-controls {
  position: absolute;
  bottom: 1rem;
  right: 1rem;
  display: flex;
  gap: 0.5rem;
  z-index: 10;
}
 
.viewer-control-btn {
  background: rgba(10, 22, 40, 0.9);
  border: 1px solid rgba(0, 217, 255, 0.3);
  color: var(--tech-cyan);
  width: 36px;
  height: 36px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s ease;
  backdrop-filter: blur(8px);
}
 
.viewer-control-btn:hover {
  background: var(--tech-cyan);
  color: var(--blueprint-dark);
  transform: scale(1.1);
}
 
/* Export Buttons */
.export-section {
  margin-top: 1.5rem;
}
 
.export-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.75rem;
}
 
.export-btn {
  background: linear-gradient(135deg, var(--tech-orange) 0%, #ff8c5a 100%);
  border: none;
  color: var(--blueprint-dark);
  padding: 0.875rem 1rem;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
 
.export-btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  transform: translate(-50%, -50%);
  transition: width 0.4s ease, height 0.4s ease;
}
 
.export-btn:hover::before {
  width: 300px;
  height: 300px;
}
 
.export-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
}
 
.export-btn:active {
  transform: translateY(0);
}
 
.export-btn-icon {
  margin-right: 0.5rem;
}
 
/* Loading State */
.loading {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(10, 22, 40, 0.95);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
 
.loading.active {
  display: flex;
}
 
.loading-spinner {
  width: 60px;
  height: 60px;
  border: 3px solid rgba(0, 217, 255, 0.2);
  border-top-color: var(--tech-cyan);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
 
@keyframes spin {
  to { transform: rotate(360deg); }
}
 
/* Responsive */
@media (max-width: 1200px) {
  .main-grid {
    grid-template-columns: 1fr;
  }
  
  .export-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
 
@media (max-width: 640px) {
  .results-grid {
    grid-template-columns: 1fr;
  }
  
  .export-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
 
<body>
<div class="app-container">
 
<!-- Header -->
<header class="app-header">
  <div class="header-content">
    <div>
      <h1 class="app-title">Scaffold Engineering Pro</h1>
      <p class="app-subtitle">3D Structural Calculator & BOQ Generator</p>
    </div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span>SYSTEM READY</span>
    </div>
  </div>
</header>
 
<!-- Main Content -->
<main class="main-grid">
  
  <!-- Left Panel - Inputs -->
  <aside>
    
    <!-- Configuration Card -->
    <div class="card">
      <h2 class="card-title">Configuration</h2>
      
      <div class="input-group">
        <label class="input-label">Scaffold Type</label>
        <select id="scaffoldType" class="select-field">
          <option value="independent">Independent Scaffold</option>
          <option value="tower">Tower Scaffold</option>
          <option value="birdcage">Birdcage Scaffold</option>
        </select>
      </div>
      
      <div class="input-group">
        <label class="input-label">Height (m)</label>
        <input type="number" id="tinggi" class="input-field" placeholder="e.g., 12" step="0.1" min="0">
        <div id="tinggiError" class="input-error"></div>
      </div>
      
      <div class="input-group">
        <label class="input-label">Length (m)</label>
        <input type="number" id="panjang" class="input-field" placeholder="e.g., 20" step="0.1" min="0">
        <div id="panjangError" class="input-error"></div>
      </div>
      
      <div class="input-group">
        <label class="input-label">Width (m)</label>
        <input type="number" id="lebar" class="input-field" placeholder="e.g., 8" step="0.1" min="0">
        <div id="lebarError" class="input-error"></div>
      </div>
      
      <div class="input-group">
        <label class="input-label">Number of Bays</label>
        <input type="number" id="bay" class="input-field" placeholder="e.g., 10" step="1" min="1">
        <div id="bayError" class="input-error"></div>
      </div>
      
      <div class="input-group">
        <label class="input-label">Number of Lifts</label>
        <input type="number" id="lift" class="input-field" placeholder="e.g., 6" step="1" min="1">
        <div id="liftError" class="input-error"></div>
      </div>
      
      <div class="input-group">
        <label class="input-label">Bay Spacing (m)</label>
        <input type="number" id="baySpacing" class="input-field" value="2.0" step="0.1" min="0.5" max="3">
        <div id="baySpacingError" class="input-error"></div>
      </div>
      
      <div class="input-group">
        <label class="input-label">Lift Height (m)</label>
        <input type="number" id="liftHeight" class="input-field" value="2.0" step="0.1" min="1" max="3">
        <div id="liftHeightError" class="input-error"></div>
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="screwjack" class="checkbox-input">
        <label for="screwjack" class="checkbox-label">Include Screw Jacks</label>
      </div>
      
      <div id="warningBox" class="warning-box">
        <div class="warning-title">Safety Alert</div>
        <div id="warningText" class="warning-text"></div>
      </div>
    </div>
    
    <!-- Results Card -->
    <div class="card" style="margin-top: 1.5rem;">
      <h2 class="card-title">Bill of Quantities</h2>
      <div id="resultsContainer" class="results-grid">
        <!-- Results will be populated here -->
      </div>
    </div>
    
    <!-- Export Section -->
    <div class="export-section">
      <div class="export-grid">
        <button class="export-btn" onclick="exportPDF()">
          <span class="export-btn-icon">📄</span>
          PDF
        </button>
        <button class="export-btn" onclick="exportExcel()">
          <span class="export-btn-icon">📊</span>
          Excel
        </button>
        <button class="export-btn" onclick="exportCSV()">
          <span class="export-btn-icon">📋</span>
          CSV
        </button>
        <button class="export-btn" onclick="exportZIP()">
          <span class="export-btn-icon">🗜️</span>
          ZIP
        </button>
      </div>
    </div>
    
  </aside>
  
  <!-- Right Panel - 3D Viewer -->
  <section>
    <div class="card" style="padding: 0; height: 100%;">
      <div class="viewer-container" id="viewer">
        <div class="viewer-overlay" id="viewerOverlay">
          <div class="viewer-overlay-item">
            <span class="viewer-overlay-label">Type:</span>
            <span class="viewer-overlay-value" id="overlayType">-</span>
          </div>
          <div class="viewer-overlay-item">
            <span class="viewer-overlay-label">Dimensions:</span>
            <span class="viewer-overlay-value" id="overlayDim">-</span>
          </div>
          <div class="viewer-overlay-item">
            <span class="viewer-overlay-label">Components:</span>
            <span class="viewer-overlay-value" id="overlayComp">-</span>
          </div>
        </div>
        <div class="viewer-controls">
          <button class="viewer-control-btn" onclick="resetCamera()" title="Reset View">⟲</button>
          <button class="viewer-control-btn" onclick="toggleWireframe()" title="Toggle Wireframe">◫</button>
        </div>
      </div>
    </div>
  </section>
  
</main>
 
</div>
 
<div class="loading" id="loading">
  <div class="loading-spinner"></div>
</div>
 
<script>
 
// Standard pipe stock lengths
const STOCK_LENGTHS = [0.3, 0.5, 0.7, 0.8, 0.9, 1, 1.2, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5, 6];
 
// Safety ratios for different scaffold types
const SAFETY_RATIOS = {
  independent: { maxHeightRatio: 3.5, name: 'Independent Scaffold' },
  tower: { maxHeightRatio: 4.0, name: 'Tower Scaffold' },
  birdcage: { maxHeightRatio: 5.0, name: 'Birdcage Scaffold' }
};
 
// Global state
let currentResult = {};
let currentInputs = {};
let scene, camera, renderer, controls;
let scaffoldGroup;
let wireframeMode = false;
 
// Initialize
document.addEventListener('DOMContentLoaded', () => {
  setupEventListeners();
  initializeViewer();
});
 
function setupEventListeners() {
  const inputs = ['tinggi', 'panjang', 'lebar', 'bay', 'lift', 'baySpacing', 'liftHeight', 'scaffoldType', 'screwjack'];
  inputs.forEach(id => {
    const element = document.getElementById(id);
    if (element) {
      element.addEventListener('input', debounce(calculate, 300));
      element.addEventListener('change', calculate);
    }
  });
}
 
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}
 
// Find nearest stock length
function nearestUp(value) {
  for (let s of STOCK_LENGTHS) {
    if (s >= value) return s;
  }
  return 6;
}
 
// Validation
function validateInputs() {
  let isValid = true;
  const errors = {};
  
  const tinggi = parseFloat(document.getElementById('tinggi').value) || 0;
  const panjang = parseFloat(document.getElementById('panjang').value) || 0;
  const lebar = parseFloat(document.getElementById('lebar').value) || 0;
  const bay = parseInt(document.getElementById('bay').value) || 0;
  const lift = parseInt(document.getElementById('lift').value) || 0;
  const baySpacing = parseFloat(document.getElementById('baySpacing').value) || 2.0;
  const liftHeight = parseFloat(document.getElementById('liftHeight').value) || 2.0;
  
  // Basic validation
  if (tinggi <= 0) {
    errors.tinggi = 'Height must be greater than 0';
    isValid = false;
  }
  if (panjang <= 0) {
    errors.panjang = 'Length must be greater than 0';
    isValid = false;
  }
  if (lebar <= 0) {
    errors.lebar = 'Width must be greater than 0';
    isValid = false;
  }
  if (bay <= 0) {
    errors.bay = 'Number of bays must be greater than 0';
    isValid = false;
  }
  if (lift <= 0) {
    errors.lift = 'Number of lifts must be greater than 0';
    isValid = false;
  }
  if (baySpacing < 0.5 || baySpacing > 3) {
    errors.baySpacing = 'Bay spacing must be between 0.5m and 3m';
    isValid = false;
  }
  if (liftHeight < 1 || liftHeight > 3) {
    errors.liftHeight = 'Lift height must be between 1m and 3m';
    isValid = false;
  }
  
  // Check if total length matches bays * spacing
  const expectedLength = bay * baySpacing;
  if (Math.abs(expectedLength - panjang) > 0.5) {
    errors.bay = `Bay count × spacing (${expectedLength.toFixed(1)}m) doesn't match length`;
    isValid = false;
  }
  
  // Check if total height matches lifts * height
  const expectedHeight = lift * liftHeight;
  if (Math.abs(expectedHeight - tinggi) > 0.5) {
    errors.lift = `Lift count × height (${expectedHeight.toFixed(1)}m) doesn't match total height`;
    isValid = false;
  }
  
  // Display errors
  Object.keys(errors).forEach(key => {
    const errorElement = document.getElementById(`${key}Error`);
    const inputElement = document.getElementById(key);
    if (errorElement && inputElement) {
      errorElement.textContent = errors[key];
      errorElement.classList.add('visible');
      inputElement.classList.add('error');
    }
  });
  
  // Clear errors for valid fields
  ['tinggi', 'panjang', 'lebar', 'bay', 'lift', 'baySpacing', 'liftHeight'].forEach(key => {
    if (!errors[key]) {
      const errorElement = document.getElementById(`${key}Error`);
      const inputElement = document.getElementById(key);
      if (errorElement && inputElement) {
        errorElement.classList.remove('visible');
        inputElement.classList.remove('error');
      }
    }
  });
  
  return { isValid, errors };
}
 
// Safety check
function checkSafetyRatio() {
  const tinggi = parseFloat(document.getElementById('tinggi').value) || 0;
  const panjang = parseFloat(document.getElementById('panjang').value) || 0;
  const lebar = parseFloat(document.getElementById('lebar').value) || 0;
  const scaffoldType = document.getElementById('scaffoldType').value;
  
  const smallestBaseDim = Math.min(panjang, lebar);
  const ratio = tinggi / smallestBaseDim;
  const maxRatio = SAFETY_RATIOS[scaffoldType].maxHeightRatio;
  
  const warningBox = document.getElementById('warningBox');
  const warningText = document.getElementById('warningText');
  
  if (ratio > maxRatio) {
    warningText.textContent = `Height-to-base ratio (${ratio.toFixed(2)}) exceeds safe limit (${maxRatio}) for ${SAFETY_RATIOS[scaffoldType].name}. Additional bracing and tie-ins required. Consider wider base or scaffold type change.`;
    warningBox.classList.add('visible');
    return false;
  } else {
    warningBox.classList.remove('visible');
    return true;
  }
}
 
// Main calculation
function calculate() {
  const validation = validateInputs();
  if (!validation.isValid) {
    clearResults();
    return;
  }
  
  const inputs = {
    tinggi: parseFloat(document.getElementById('tinggi').value) || 0,
    panjang: parseFloat(document.getElementById('panjang').value) || 0,
    lebar: parseFloat(document.getElementById('lebar').value) || 0,
    bay: parseInt(document.getElementById('bay').value) || 0,
    lift: parseInt(document.getElementById('lift').value) || 0,
    baySpacing: parseFloat(document.getElementById('baySpacing').value) || 2.0,
    liftHeight: parseFloat(document.getElementById('liftHeight').value) || 2.0,
    scaffoldType: document.getElementById('scaffoldType').value,
    screwjack: document.getElementById('screwjack').checked
  };
  
  currentInputs = inputs;
  checkSafetyRatio();
  
  // Calculate based on scaffold type
  let result;
  switch (inputs.scaffoldType) {
    case 'tower':
      result = calculateTowerScaffold(inputs);
      break;
    case 'birdcage':
      result = calculateBirdcageScaffold(inputs);
      break;
    default:
      result = calculateIndependentScaffold(inputs);
  }
  
  currentResult = result;
  displayResults(result);
  render3DScaffold(inputs);
}
 
function calculateIndependentScaffold(d) {
  const smallestBaseDim = Math.min(d.panjang, d.lebar);
  const maxSafeHeight = SAFETY_RATIOS.independent.maxHeightRatio * smallestBaseDim;
  const standardPipeLength = nearestUp(maxSafeHeight);
  
  // Standards (vertical posts) - 4 corners
  const standards = 4;
  
  // Joints per standard
  const jointsPerStandard = d.tinggi > standardPipeLength ? Math.ceil(d.tinggi / standardPipeLength) - 1 : 0;
  const totalJoints = standards * jointsPerStandard;
  
  // Ledgers (longitudinal horizontals)
  const ledgersPerSide = d.bay + 1;
  const ledgers = ledgersPerSide * 2 * d.lift;
  
  // Transoms (cross horizontals)
  const transoms = d.bay * 2 * d.lift;
  
  // Putlogs (board supports)
  const putlogs = transoms;
  
  // Bracing (diagonal) - 1 pair every 3 bays
  const bracedBays = Math.ceil(d.bay / 3);
  const bracing = bracedBays * 2 * d.lift;
  
  // Handrails
  const handrails = ledgersPerSide * 2 * d.lift;
  
  // Toe boards
  const toeboards = 4 * d.lift;
  
  // Boards/Planks
  const planksPerBay = Math.ceil(d.lebar / 0.3); // Assuming 30cm board width
  const totalPlanks = d.bay * planksPerBay * d.lift;
  
  // Couplers
  const doubleCouplers = (ledgers + transoms + handrails) * 2;
  const swivelCouplers = bracing * 2;
  const singleCouplers = putlogs * 2;
  
  // Base components
  const baseplates = standards;
  const solboards = standards;
  const screwjacks = d.screwjack ? standards : 0;
  
  return {
    scaffoldType: 'Independent Scaffold',
    dimensions: `${d.panjang}m × ${d.lebar}m × ${d.tinggi}m`,
    baseDimension: smallestBaseDim.toFixed(2),
    maxSafeHeight: maxSafeHeight.toFixed(2),
    standardPipeLength: standardPipeLength.toFixed(2),
    standards,
    joints: totalJoints,
    ledgers,
    transoms,
    putlogs,
    bracing,
    handrails,
    toeboards,
    planks: totalPlanks,
    doubleCouplers,
    swivelCouplers,
    singleCouplers,
    baseplates,
    solboards,
    screwjacks
  };
}
 
function calculateTowerScaffold(d) {
  const smallestBaseDim = Math.min(d.panjang, d.lebar);
  const maxSafeHeight = SAFETY_RATIOS.tower.maxHeightRatio * smallestBaseDim;
  const standardPipeLength = nearestUp(maxSafeHeight);
  
  // Tower scaffold has more standards (4 per bay)
  const standards = 4 * d.bay;
  const jointsPerStandard = d.tinggi > standardPipeLength ? Math.ceil(d.tinggi / standardPipeLength) - 1 : 0;
  const totalJoints = standards * jointsPerStandard;
  
  // More horizontal members for stability
  const ledgers = (d.bay + 1) * 4 * d.lift;
  const transoms = d.bay * 4 * d.lift;
  const putlogs = transoms;
  
  // More bracing for tower
  const bracing = d.bay * 4 * d.lift;
  
  const handrails = (d.bay + 1) * 4 * d.lift;
  const toeboards = 4 * d.lift;
  
  const planksPerBay = Math.ceil(d.lebar / 0.3);
  const totalPlanks = d.bay * planksPerBay * d.lift;
  
  const doubleCouplers = (ledgers + transoms + handrails) * 2;
  const swivelCouplers = bracing * 2;
  const singleCouplers = putlogs * 2;
  
  const baseplates = standards;
  const solboards = standards;
  const screwjacks = d.screwjack ? standards : 0;
  
  return {
    scaffoldType: 'Tower Scaffold',
    dimensions: `${d.panjang}m × ${d.lebar}m × ${d.tinggi}m`,
    baseDimension: smallestBaseDim.toFixed(2),
    maxSafeHeight: maxSafeHeight.toFixed(2),
    standardPipeLength: standardPipeLength.toFixed(2),
    standards,
    joints: totalJoints,
    ledgers,
    transoms,
    putlogs,
    bracing,
    handrails,
    toeboards,
    planks: totalPlanks,
    doubleCouplers,
    swivelCouplers,
    singleCouplers,
    baseplates,
    solboards,
    screwjacks
  };
}
 
function calculateBirdcageScaffold(d) {
  const smallestBaseDim = Math.min(d.panjang, d.lebar);
  const maxSafeHeight = SAFETY_RATIOS.birdcage.maxHeightRatio * smallestBaseDim;
  const standardPipeLength = nearestUp(maxSafeHeight);
  
  // Birdcage has standards throughout (grid pattern)
  const standardsLength = Math.ceil(d.panjang / d.baySpacing) + 1;
  const standardsWidth = Math.ceil(d.lebar / d.baySpacing) + 1;
  const standards = standardsLength * standardsWidth;
  
  const jointsPerStandard = d.tinggi > standardPipeLength ? Math.ceil(d.tinggi / standardPipeLength) - 1 : 0;
  const totalJoints = standards * jointsPerStandard;
  
  // Extensive horizontal grid
  const ledgers = standardsLength * standardsWidth * d.lift;
  const transoms = standardsWidth * standardsLength * d.lift;
  const putlogs = transoms;
  
  // Less bracing needed due to grid structure
  const bracing = Math.ceil(d.bay / 4) * 2 * d.lift;
  
  const handrails = ((standardsLength + standardsWidth) * 2) * d.lift;
  const toeboards = 4 * d.lift;
  
  const planksPerBay = Math.ceil(d.lebar / 0.3);
  const totalPlanks = d.bay * planksPerBay * d.lift;
  
  const doubleCouplers = (ledgers + transoms + handrails) * 2;
  const swivelCouplers = bracing * 2;
  const singleCouplers = putlogs * 2;
  
  const baseplates = standards;
  const solboards = standards;
  const screwjacks = d.screwjack ? standards : 0;
  
  return {
    scaffoldType: 'Birdcage Scaffold',
    dimensions: `${d.panjang}m × ${d.lebar}m × ${d.tinggi}m`,
    baseDimension: smallestBaseDim.toFixed(2),
    maxSafeHeight: maxSafeHeight.toFixed(2),
    standardPipeLength: standardPipeLength.toFixed(2),
    standards,
    joints: totalJoints,
    ledgers,
    transoms,
    putlogs,
    bracing,
    handrails,
    toeboards,
    planks: totalPlanks,
    doubleCouplers,
    swivelCouplers,
    singleCouplers,
    baseplates,
    solboards,
    screwjacks
  };
}

// 3D Visualization
function initializeViewer() {
  const container = document.getElementById('viewer');
  
  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1628);
  scene.fog = new THREE.Fog(0x0a1628, 50, 200);
  
  // Camera
  camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(20, 15, 25);
  
  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);
  
  // Lighting
  const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
  scene.add(ambientLight);
  
  const directionalLight = new THREE.DirectionalLight(0x00d9ff, 1.2);
  directionalLight.position.set(20, 30, 20);
  directionalLight.castShadow = true;
  directionalLight.shadow.camera.left = -50;
  directionalLight.shadow.camera.right = 50;
  directionalLight.shadow.camera.top = 50;
  directionalLight.shadow.camera.bottom = -50;
  scene.add(directionalLight);
  
  const orangeLight = new THREE.PointLight(0xff6b35, 0.5, 100);
  orangeLight.position.set(-15, 10, 15);
  scene.add(orangeLight);
  
  // Grid
  const gridHelper = new THREE.GridHelper(100, 50, 0x00d9ff, 0x1e3a5f);
  gridHelper.material.opacity = 0.2;
  gridHelper.material.transparent = true;

  window.addEventListener('resize', onWindowResize);

}
 
function onWindowResize() {
  const container = document.getElementById('viewer');
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
}
 
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
 
function render3DScaffold(inputs) {
  // Remove existing scaffold
  if (scaffoldGroup) {
    scene.remove(scaffoldGroup);
  }
  
  scaffoldGroup = new THREE.Group();
  
  if (inputs.bay <= 0 || inputs.lift <= 0) return;
  
  const pipeRadius = 0.025;
  const baySpacing = inputs.baySpacing;
  const liftHeight = inputs.liftHeight;
  
  // Materials
  const standardMaterial = new THREE.MeshPhongMaterial({ 
    color: 0x00d9ff, 
    emissive: 0x00d9ff,
    emissiveIntensity: 0.2,
    shininess: 100
  });
  
  const ledgerMaterial = new THREE.MeshPhongMaterial({ 
    color: 0xff6b35,
    emissive: 0xff6b35,
    emissiveIntensity: 0.1,
    shininess: 100
  });
  
  const bracingMaterial = new THREE.MeshPhongMaterial({ 
    color: 0xffff00,
    emissive: 0xffff00,
    emissiveIntensity: 0.1,
    shininess: 100
  });
  
  // Create scaffold based on type
  switch (inputs.scaffoldType) {
    case 'tower':
      createTowerScaffold3D(scaffoldGroup, inputs, baySpacing, liftHeight, pipeRadius, standardMaterial, ledgerMaterial, bracingMaterial);
      break;
    case 'birdcage':
      createBirdcageScaffold3D(scaffoldGroup, inputs, baySpacing, liftHeight, pipeRadius, standardMaterial, ledgerMaterial, bracingMaterial);
      break;
    default:
      createIndependentScaffold3D(scaffoldGroup, inputs, baySpacing, liftHeight, pipeRadius, standardMaterial, ledgerMaterial, bracingMaterial);
  }
  
  // Center the scaffold
  const box = new THREE.Box3().setFromObject(scaffoldGroup);
  const center = box.getCenter(new THREE.Vector3());
  scaffoldGroup.position.sub(center);
  scaffoldGroup.position.y = 0;
  
  scene.add(scaffoldGroup);
  
  // Update overlay
  updateViewerOverlay(inputs);
  
  // Reset camera to fit scaffold
  fitCameraToScaffold();
}
 
function createIndependentScaffold3D(group, inputs, baySpacing, liftHeight, radius, stdMat, ledMat, bracMat) {
  const totalLength = inputs.panjang;
  const totalWidth = inputs.lebar;
  const totalHeight = inputs.tinggi;
  
  // Standards (4 corners)
  const corners = [
    [0, 0], [totalLength, 0], [totalLength, totalWidth], [0, totalWidth]
  ];
  
  corners.forEach(([x, z]) => {
    const geometry = new THREE.CylinderGeometry(radius, radius, totalHeight, 8);
    const mesh = new THREE.Mesh(geometry, stdMat);
    mesh.position.set(x, totalHeight / 2, z);
    mesh.castShadow = true;
    group.add(mesh);
  });
  
  // Ledgers and transoms for each lift
  for (let lift = 0; lift <= inputs.lift; lift++) {
    const y = lift * liftHeight;
    
    // Ledgers (along length)
    [[0, 0, totalLength, 0], [0, totalWidth, totalLength, totalWidth]].forEach(([x1, z1, x2, z2]) => {
      addPipe(group, [x1, y, z1], [x2, y, z2], radius, ledMat);
    });
    
    // Transoms (along width)
    [[0, 0, 0, totalWidth], [totalLength, 0, totalLength, totalWidth]].forEach(([x1, z1, x2, z2]) => {
      addPipe(group, [x1, y, z1], [x2, y, z2], radius, ledMat);
    });
  }
  
  // Bracing (diagonal) - every 3rd bay
  for (let b = 0; b < inputs.bay; b++) {
    if (b % 3 === 0) {
      for (let lift = 0; lift < inputs.lift; lift++) {
        const x1 = b * baySpacing;
        const x2 = Math.min((b + 1) * baySpacing, totalLength);
        const y1 = lift * liftHeight;
        const y2 = (lift + 1) * liftHeight;
        
        // Front face bracing
        addPipe(group, [x1, y1, 0], [x2, y2, 0], radius * 0.8, bracMat);
        
        // Back face bracing
        addPipe(group, [x1, y1, totalWidth], [x2, y2, totalWidth], radius * 0.8, bracMat);
      }
    }
  }
}
 
function createTowerScaffold3D(group, inputs, baySpacing, liftHeight, radius, stdMat, ledMat, bracMat) {
  const totalLength = inputs.panjang;
  const totalWidth = inputs.lebar;
  const totalHeight = inputs.tinggi;
  
  // Standards at each bay
  for (let b = 0; b <= inputs.bay; b++) {
    const x = b * baySpacing;
    if (x > totalLength) break;
    
    [[0], [totalWidth]].forEach(([z]) => {
      const geometry = new THREE.CylinderGeometry(radius, radius, totalHeight, 8);
      const mesh = new THREE.Mesh(geometry, stdMat);
      mesh.position.set(x, totalHeight / 2, z);
      mesh.castShadow = true;
      group.add(mesh);
    });
  }
  
  // Dense horizontal grid
  for (let lift = 0; lift <= inputs.lift; lift++) {
    const y = lift * liftHeight;
    
    // Ledgers
    for (let z of [0, totalWidth]) {
      addPipe(group, [0, y, z], [totalLength, y, z], radius, ledMat);
    }
    
    // Transoms
    for (let b = 0; b <= inputs.bay; b++) {
      const x = b * baySpacing;
      if (x > totalLength) break;
      addPipe(group, [x, y, 0], [x, y, totalWidth], radius, ledMat);
    }
  }
  
  // Bracing
  for (let b = 0; b < inputs.bay; b++) {
    for (let lift = 0; lift < inputs.lift; lift++) {
      const x1 = b * baySpacing;
      const x2 = (b + 1) * baySpacing;
      const y1 = lift * liftHeight;
      const y2 = (lift + 1) * liftHeight;
      
      if (x2 <= totalLength) {
        addPipe(group, [x1, y1, 0], [x2, y2, 0], radius * 0.8, bracMat);
        addPipe(group, [x1, y1, totalWidth], [x2, y2, totalWidth], radius * 0.8, bracMat);
      }
    }
  }
}
 
function createBirdcageScaffold3D(group, inputs, baySpacing, liftHeight, radius, stdMat, ledMat, bracMat) {
  const totalLength = inputs.panjang;
  const totalWidth = inputs.lebar;
  const totalHeight = inputs.tinggi;
  
  const numStandardsLength = Math.ceil(totalLength / baySpacing) + 1;
  const numStandardsWidth = Math.ceil(totalWidth / baySpacing) + 1;
  
  // Grid of standards
  for (let i = 0; i < numStandardsLength; i++) {
    for (let j = 0; j < numStandardsWidth; j++) {
      const x = i * baySpacing;
      const z = j * baySpacing;
      if (x <= totalLength && z <= totalWidth) {
        const geometry = new THREE.CylinderGeometry(radius, radius, totalHeight, 8);
        const mesh = new THREE.Mesh(geometry, stdMat);
        mesh.position.set(x, totalHeight / 2, z);
        mesh.castShadow = true;
        group.add(mesh);
      }
    }
  }
  
  // Complete horizontal grid
  for (let lift = 0; lift <= inputs.lift; lift++) {
    const y = lift * liftHeight;
    
    // Ledgers (along length)
    for (let j = 0; j < numStandardsWidth; j++) {
      const z = j * baySpacing;
      if (z <= totalWidth) {
        addPipe(group, [0, y, z], [totalLength, y, z], radius, ledMat);
      }
    }
    
    // Transoms (along width)
    for (let i = 0; i < numStandardsLength; i++) {
      const x = i * baySpacing;
      if (x <= totalLength) {
        addPipe(group, [x, y, 0], [x, y, totalWidth], radius, ledMat);
      }
    }
  }
}
 
function addPipe(group, start, end, radius, material) {
  const [x1, y1, z1] = start;
  const [x2, y2, z2] = end;
  
  const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2) + Math.pow(z2 - z1, 2));
  const geometry = new THREE.CylinderGeometry(radius, radius, distance, 8);
  const mesh = new THREE.Mesh(geometry, material);
  
  mesh.position.set((x1 + x2) / 2, (y1 + y2) / 2, (z1 + z2) / 2);
  
  const direction = new THREE.Vector3(x2 - x1, y2 - y1, z2 - z1).normalize();
  const axis = new THREE.Vector3(0, 1, 0);
  const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, direction);
  mesh.quaternion.copy(quaternion);
  
  mesh.castShadow = true;
  group.add(mesh);
}
 
function updateViewerOverlay(inputs) {
  document.getElementById('overlayType').textContent = SAFETY_RATIOS[inputs.scaffoldType].name;
  document.getElementById('overlayDim').textContent = `${inputs.panjang}×${inputs.lebar}×${inputs.tinggi}m`;
  
  const totalComponents = currentResult.standards + currentResult.ledgers + currentResult.transoms + currentResult.bracing;
  document.getElementById('overlayComp').textContent = totalComponents;
}
 
function fitCameraToScaffold() {
  if (!scaffoldGroup) return;
  
  const box = new THREE.Box3().setFromObject(scaffoldGroup);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * (Math.PI / 180);
  let cameraDistance = maxDim / (2 * Math.tan(fov / 2));
  cameraDistance *= 1.5; // Add some padding
  
  camera.position.set(cameraDistance, cameraDistance * 0.7, cameraDistance);
  camera.lookAt(0, size.y / 2, 0);
  controls.target.set(0, size.y / 2, 0);
  controls.update();
}
 
function resetCamera() {
  fitCameraToScaffold();
}
 
function toggleWireframe() {
  wireframeMode = !wireframeMode;
  if (scaffoldGroup) {
    scaffoldGroup.traverse((child) => {
      if (child.isMesh) {
        child.material.wireframe = wireframeMode;
      }
    });
  }
}
